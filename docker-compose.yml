services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
    environment:
      - FC_DEVICE=cpu

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/api/v1
    depends_on:
      - api
